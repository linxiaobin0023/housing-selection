<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="嘉禧苑选房">
    <meta name="description" content="光明区第四批次保障性租赁住房选房系统">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">
    
    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="splash/apple-splash-2048-2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/apple-splash-1668-2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/apple-splash-1536-2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/apple-splash-1170-2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/apple-splash-1125-2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/apple-splash-1242-2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    
    <title>嘉禧苑选房系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .filters {
            background: white;
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        .filter-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }

        .filter-group label {
            font-weight: 600;
            color: #555;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            padding: 12px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
            background: #fafafa;
            color: #333;
        }

        .filter-group select:hover {
            border-color: #d0d0d0;
            background: #f5f5f5;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .filter-actions {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e8e8f8;
            transform: translateY(-2px);
        }

        /* 移动端禁用hover效果 */
        @media (hover: none) {
            .btn-primary:hover {
                transform: none;
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            }

            .btn-secondary:hover {
                background: #f5f5f5;
                transform: none;
            }
        }

        /* 登录页面样式 */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #667eea;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #888;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 10px;
        }

        .login-footer {
            margin-top: 20px;
            text-align: center;
        }

        .guest-btn {
            width: 100%;
            padding: 12px;
        }

        /* 头部用户信息 */
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .user-info span {
            color: white;
            font-weight: 500;
        }

        .logout-btn {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* 只读模式提示 */
        .readonly-banner {
            background: linear-gradient(135deg, #ffd89b 0%, #ff9a9e 100%);
            color: #333;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        /* 楼栋头部 */
        .building-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .reset-all-btn {
            padding: 8px 16px;
            font-size: 13px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            border: none;
        }

        .reset-all-btn:hover {
            background: linear-gradient(135deg, #ee5a5a 0%, #dd4848 100%);
            transform: translateY(-2px);
        }

        /* 确认弹框 */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .confirm-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .confirm-content h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .confirm-content p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .confirm-buttons .btn {
            padding: 12px 30px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #ee5a5a 0%, #dd4848 100%);
        }

        .preferred-section {
            background: linear-gradient(135deg, #f0f7ff 0%, #e6f0ff 100%);
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.1);
            border: 2px solid rgba(102, 126, 234, 0.15);
        }

        .preferred-section h3 {
            font-size: 1.1rem;
            color: #667eea;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preferred-section h3::before {
            content: '⭐';
        }

        .preferred-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .preferred-option {
            padding: 12px 20px;
            border: 2px solid #d0d8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            color: #555;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 80px;
        }

        .preferred-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .preferred-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .preferred-option.selected:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* 房型筛选激活状态 */
        .preferred-option.active-filter {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            border-color: #4ecdc4;
            color: white;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
            transform: scale(1.05);
        }

        .preferred-option.active-filter:hover {
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        .preferred-option.active-filter .count {
            opacity: 0.9;
            color: white;
        }

        /* 移动端禁用hover效果，防止点击后状态断裂 */
        @media (hover: none) {
            .preferred-option:hover {
                border-color: #d0d8f0;
                background: white;
                transform: none;
            }

            .preferred-option.selected:hover {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-color: #667eea;
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            }
        }

        .preferred-option .count {
            font-size: 12px;
            opacity: 0.7;
            font-weight: 600;
        }

        .preferred-option.selected .count {
            opacity: 0.9;
        }

        .house-card.preferred {
            background: linear-gradient(135deg, #e6f0ff 0%, #f0f7ff 100%);
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2), 0 8px 25px rgba(102, 126, 234, 0.15);
        }

        .house-card.preferred::before {
            content: '⭐';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 12px;
        }

        .house-card.preferred:hover {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3), 0 12px 35px rgba(102, 126, 234, 0.25);
        }

        /* 已选房源滚动显示 */
        .selected-houses-ticker {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe6e6 100%);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 77, 79, 0.15);
            border: 2px solid rgba(255, 77, 79, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
            overflow: hidden;
        }

        .ticker-label {
            font-weight: 600;
            color: #ff4d4f;
            font-size: 0.95rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ticker-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to right, transparent, black 20px, black calc(100% - 20px), transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 20px, black calc(100% - 20px), transparent);
        }

        .ticker-scroll {
            display: flex;
            gap: 12px;
            animation: tickerScroll 20s linear infinite;
            white-space: nowrap;
        }

        .ticker-scroll:hover {
            animation-play-state: paused;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: white;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #333;
            border: 1px solid #ffcdd2;
            box-shadow: 0 2px 8px rgba(255, 77, 79, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .ticker-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 77, 79, 0.2);
            border-color: #ff4d4f;
        }

        .ticker-item .building {
            font-weight: 600;
            color: #ff4d4f;
        }

        .ticker-item .room {
            font-weight: 500;
        }

        .ticker-count {
            font-weight: 700;
            color: #ff4d4f;
            font-size: 1rem;
            white-space: nowrap;
            flex-shrink: 0;
            padding: 6px 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid #ffcdd2;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .selected-houses-ticker {
                padding: 12px 16px;
                gap: 10px;
            }

            .ticker-label {
                font-size: 0.85rem;
            }

            .ticker-item {
                padding: 6px 10px;
                font-size: 0.8rem;
            }

            .ticker-count {
                font-size: 0.9rem;
                padding: 4px 8px;
            }
        }

        /* 移动端禁用hover效果 */
        @media (hover: none) {
            .ticker-item:hover {
                transform: none;
                box-shadow: 0 2px 8px rgba(255, 77, 79, 0.1);
                border-color: #ffcdd2;
            }
        }

        /* 房源高亮动画 */
        @keyframes highlightPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 77, 79, 0.7);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(255, 77, 79, 0);
                transform: scale(1.05);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 77, 79, 0);
                transform: scale(1);
            }
        }

        /* 视图切换容器 */
        .view-toggle-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .view-toggle-inline {
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .view-toggle-inline button {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #666;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 600;
        }

        .view-toggle-inline button:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        .view-toggle-inline button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        /* 移动端禁用hover效果 */
        @media (hover: none) {
            .view-toggle-inline button:hover {
                border-color: #e0e0e0;
                color: #666;
                transform: none;
            }

            .view-toggle-inline button.active:hover {
                border-color: #667eea;
                color: white;
            }
        }

        /* 悬浮统计按钮 */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 56px;
            height: 56px;
        }

        .fab-button {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.5);
        }

        .fab-button.active {
            transform: rotate(45deg);
        }

        /* 移动端禁用hover效果 */
        @media (hover: none) {
            .fab-button:hover {
                transform: none;
                box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            }

            .fab-button.active:hover {
                transform: rotate(45deg);
            }
        }

        .fab-panel {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 320px;
            max-width: 400px;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
            z-index: 101;
        }

        .fab-panel.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            visibility: visible;
        }

        .fab-panel-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .fab-panel-left,
        .fab-panel-right {
            flex: 1;
        }

        .fab-panel h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fab-panel h3::before {
            content: '📊';
        }

        .fab-stats {
            display: flex;
            gap: 12px;
        }

        .fab-stat-card {
            flex: 1;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .fab-stat-card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
        }

        .fab-stat-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* 移动端禁用hover效果 */
        @media (hover: none) {
            .fab-stat-card:hover {
                transform: none;
                border-color: transparent;
            }

            .fab-stat-card.active:hover {
                border-color: #667eea;
            }
        }

        .fab-stat-card .number {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .fab-stat-card .label {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        /* 主图表区域样式 */
        .stats-section {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        .stats-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .main-chart-wrapper {
            width: 100%;
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .main-chart-wrapper canvas {
            width: 100% !important;
            height: auto !important;
            max-height: 400px;
        }

        @media (max-width: 768px) {
            .main-chart-wrapper {
                padding: 15px;
            }

            .main-chart-wrapper canvas {
                max-height: 300px;
            }
        }

        .fab-preferred {
            border-top: 1px solid #e8e8e8;
            padding-top: 16px;
        }

        .fab-preferred h4 {

            modal.id = 'resetConfirmModal';
            modal.innerHTML = `
                <div class="confirm-content">
                    <h3>⚠️ 确认重置</h3>

        // 关闭重置确认弹框
        function closeResetConfirm() {
            const modal = document.getElementById('resetConfirmModal');
            if (modal) {
                modal.remove();
            }
        }

        // 重置所有房源
        async function resetAllHouses() {
            if (!canEdit()) {
                alert('您没有权限执行此操作');
                return;
            }

            try {
                // 将所有房源状态设为 available
                housesData.forEach(house => {
                    if (house.status === 'selected') {
                        house.status = 'available';
                    }
                });

                // 保存到云端
                await saveToCloud();

                // 更新显示
                updateStats();
                renderGridView();
                renderListView();

                // 关闭弹框
                closeResetConfirm();

                alert('所有房源已重置为未选状态');
            } catch (error) {
                console.error('重置失败:', error);
                alert('重置失败，请稍后重试');
            }
        }

        // 从Supabase加载数据 - 新表结构：每行一个房源状态
        async function loadFromSupabase() {
            if (!supabaseClient) return null;
            try {
                console.log('正在从Supabase加载数据...');
                const { data, error } = await supabaseClient
                    .from('houses_data')
                    .select('*');

                if (error) {
                    console.error('Supabase查询错误:', error);
                    return null;
                }

                console.log('Supabase返回数据条数:', data ? data.length : 0);

                // 转换为 {id, status} 格式
                if (data && data.length > 0) {
                    const statusData = data.map(row => ({ 
                        id: row.house_id, 
                        status: row.status 
                    }));
                    console.log('从Supabase加载数据成功');
                    return statusData;
                }
                console.log('Supabase中没有数据');
                return null;
            } catch (error) {
                console.error('从Supabase加载失败:', error);
                return null;
            }
        }

        // 保存数据到Supabase - 使用upsert避免数据丢失
        async function saveToSupabase(data) {
            if (!supabaseClient) {
                console.error('Supabase客户端未初始化');
                return false;
            }
            try {
                console.log('正在保存数据到Supabase...');
                
                // 获取当前选中的房源ID
                const selectedIds = data
                    .filter(h => h.status === 'selected')
                    .map(h => h.id);
                
                console.log('当前选中房源数:', selectedIds.length);

                // 获取数据库中已有的记录
                const { data: existingData, error: fetchError } = await supabaseClient
                    .from('houses_data')
                    .select('house_id');

                if (fetchError) {
                    console.error('获取现有数据失败:', fetchError);
                    return false;
                }

                const existingIds = new Set(existingData.map(h => h.house_id));
                const newSelectedIds = new Set(selectedIds);

                // 1. 取消选中的房源（在数据库中但不在新选中列表中的）
                const idsToDelete = [...existingIds].filter(id => !newSelectedIds.has(id));
                if (idsToDelete.length > 0) {
                    const { error: deleteError } = await supabaseClient
                        .from('houses_data')
                        .delete()
                        .in('house_id', idsToDelete);

                    if (deleteError) {
                        console.error('删除取消选中的房源失败:', deleteError);
                    }
                }

                // 2. 新增选中的房源（在新选中列表中但不在数据库中的）
                const idsToInsert = selectedIds.filter(id => !existingIds.has(id));
                if (idsToInsert.length > 0) {
                    const statusData = idsToInsert.map(id => ({ 
                        house_id: id, 
                        status: 'selected',
                        updated_at: new Date().toISOString()
                    }));

                    const { error: insertError } = await supabaseClient
                        .from('houses_data')
                        .insert(statusData);

                    if (insertError) {
                        console.error('插入新选中房源失败:', insertError);
                        return false;
                    }
                }

                console.log('数据已保存到Supabase');
                return true;
            } catch (error) {
                console.error('保存到Supabase失败:', error);
                return false;
            }
        }

        // 加载数据
        async function loadData() {
            // 首先加载本地JSON数据（基础数据）
            try {
                const response = await fetch('houses_data.json');
                housesData = await response.json();
                console.log('本地数据加载成功，房源数量:', housesData.length);
            } catch (localError) {
                console.error('本地数据加载失败:', localError);
                return;
            }

            // 然后尝试从Supabase同步数据
            try {
                const supabaseData = await loadFromSupabase();

                if (supabaseData && Array.isArray(supabaseData) && supabaseData.length > 0) {
                    // 合并数据：保留Supabase上的状态信息
                    housesData = housesData.map(localHouse => {
                        const cloudHouse = supabaseData.find(h => h.id === localHouse.id);
                        if (cloudHouse) {
                            return { ...localHouse, status: cloudHouse.status };
                        }
                        return localHouse;
                    });
                    console.log('Supabase数据合并成功');
                    isOnline = true;
                } else {
                    // Supabase没有数据，上传本地数据
                    console.log('Supabase无数据，准备上传本地数据');
                    await saveToSupabase(housesData);
                    isOnline = true;
                }

                // 设置定期同步（每10秒）
                if (!syncInterval) {
                    syncInterval = setInterval(syncFromSupabase, 10000);
                }
            } catch (error) {
                console.error('Supabase同步失败，使用本地模式:', error.message);
                isOnline = false;
            }

            // 初始化并渲染
            initFloorFilter();
            updateStats();
            renderGridView();
            renderListView();
            
            console.log('数据加载完成，房源总数:', housesData.length);
            console.log('当前楼栋:', currentBuilding);
            console.log('筛选后数据:', getFilteredData().length);
        }

        // 从Supabase同步数据（不保存，只读取）
        async function syncFromSupabase() {
            if (!supabaseClient) return;

            try {
                const supabaseData = await loadFromSupabase();
                if (supabaseData && Array.isArray(supabaseData)) {
                    // 获取云端选中的房源ID集合
                    const cloudSelectedIds = new Set(supabaseData.map(h => h.id));
                    
                    // 检查是否有变化：
                    // 1. 本地选中但云端没有（被取消）
                    // 2. 云端选中但本地没有（新选中）
                    let hasChanges = false;
                    
                    housesData = housesData.map(localHouse => {
                        const isCloudSelected = cloudSelectedIds.has(localHouse.id);
                        const isLocalSelected = localHouse.status === 'selected';
                        
                        if (isCloudSelected && !isLocalSelected) {
                            // 云端选中，本地未选中 -> 更新为选中
                            hasChanges = true;
                            return { ...localHouse, status: 'selected' };
                        } else if (!isCloudSelected && isLocalSelected) {
                            // 云端未选中，本地选中 -> 更新为可选
                            hasChanges = true;
                            return { ...localHouse, status: 'available' };
                        }
                        return localHouse;
                    });

                    if (hasChanges) {
                        updateStats();
                        renderGridView();
                        renderListView();
                        console.log('数据已从Supabase同步更新');
                    }
                }
            } catch (error) {
                console.error('同步失败:', error);
            }
        }

        // 保存数据到Supabase
        async function saveToCloud() {
            if (!isOnline || !supabaseClient) {
                console.log('离线状态，数据仅保存在本地');
                return;
            }
            await saveToSupabase(housesData);
        }

        // 初始化楼层筛选
        function initFloorFilter() {
            const floorFilter = document.getElementById('floorFilter');
            if (!floorFilter) return; // 如果元素不存在则跳过

            const floors = [...new Set(housesData.map(h => h.floor))].sort((a, b) => b - a);
            floors.forEach(floor => {
                const option = document.createElement('option');
                option.value = floor;
                option.textContent = floor + '层';
                floorFilter.appendChild(option);
            });
        }

        // 更新统计
        function updateStats() {
            const all = housesData.length;
            const selected = housesData.filter(h => h.status === 'selected').length;
            const reserved = housesData.filter(h => h.status === 'reserved').length;

        // OCR识别结果存储（包含房号和是否被划掉的状态）
        let ocrDetectedRooms = [];

        // 处理OCR图片
        async function handleOCRImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 显示预览
            const preview = document.getElementById('ocrPreview');
            preview.src = URL.createObjectURL(file);

            // 打开弹窗
            document.getElementById('ocrModal').classList.add('open');
            document.getElementById('ocrStatus').className = 'ocr-status processing';
            document.getElementById('ocrStatus').textContent = '正在识别图片中的房号...';
            document.getElementById('ocrResults').innerHTML = '';
            document.getElementById('ocrActions').style.display = 'none';

            try {
                // 创建图片对象用于分析
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await new Promise(resolve => { img.onload = resolve; });

                // 创建canvas进行图像分析
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // 使用Tesseract.js进行OCR识别
                const result = await Tesseract.recognize(
                    file,
                    'chi_sim+eng',
                    {
                        logger: m => {
                            console.log(m);
                            if (m.status === 'recognizing text') {
                                document.getElementById('ocrStatus').textContent = `正在识别... ${Math.round(m.progress * 100)}%`;
                            }
                        }
                    }
                );

                // 解析识别结果
                const text = result.data.text;
                const words = result.data.words;
                console.log('OCR识别结果:', text);
                console.log('识别到的文字块:', words);

                // 分析每个房号是否被划掉
                const detectedRooms = [];

                words.forEach(word => {
                    const text = word.text.trim();
                    // 匹配房号格式
                    const roomMatch = text.match(/(?:[ABC][-\s]?)?(\d{4})/);
                    if (roomMatch) {
                        const roomNumber = roomMatch[1];
                        if (roomNumber.length === 4) {
                            // 获取文字区域的图像数据
                            const bbox = word.bbox;
                            const padding = 10;
                            const x = Math.max(0, bbox.x0 - padding);
                            const y = Math.max(0, bbox.y0 - padding);
                            const w = Math.min(img.width - x, bbox.x1 - bbox.x0 + padding * 2);
                            const h = Math.min(img.height - y, bbox.y1 - bbox.y0 + padding * 2);

                            // 分析该区域是否有划线
                            const isCrossedOut = analyzeCrossedOut(ctx, x, y, w, h);

                            detectedRooms.push({
                                roomNumber: roomNumber,
                                isCrossedOut: isCrossedOut,
                                fullText: text
                            });
                        }
                    }
                });

                // 去重，保留划掉状态的记录
                const uniqueRooms = [];
                const seen = new Set();
                detectedRooms.forEach(room => {
                    if (!seen.has(room.roomNumber)) {
                        seen.add(room.roomNumber);
                        uniqueRooms.push(room);
                    }
                });

                ocrDetectedRooms = uniqueRooms;
                displayOCRResultsWithStatus(ocrDetectedRooms);

            } catch (error) {
                console.error('OCR识别失败:', error);
                document.getElementById('ocrStatus').className = 'ocr-status error';
                document.getElementById('ocrStatus').textContent = '识别失败，请重试或手动输入';
            }
        }

        // 分析区域是否被划掉
        function analyzeCrossedOut(ctx, x, y, w, h) {
            try {
                const imageData = ctx.getImageData(x, y, w, h);
                const data = imageData.data;
                const width = w;
                const height = h;

                // 转换为灰度图
                const gray = [];
                for (let i = 0; i < data.length; i += 4) {
                    const luminance = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                    gray.push(luminance);
                }

                // 检测水平线和斜线（划掉的特征）
                let lineCount = 0;
                const threshold = 50; // 黑色阈值

                // 检测水平线
                for (let row = 0; row < height; row += 2) {
                    let consecutiveDarkPixels = 0;
                    let maxConsecutive = 0;
                    for (let col = 0; col < width; col++) {
                        const idx = row * width + col;
                        if (gray[idx] < threshold) {
                            consecutiveDarkPixels++;
                            maxConsecutive = Math.max(maxConsecutive, consecutiveDarkPixels);
                        } else {
                            consecutiveDarkPixels = 0;
                        }
                    }
                    // 如果有一行中有足够长的连续黑色像素，认为是一条线
                    if (maxConsecutive > width * 0.3) {
                        lineCount++;
                    }
                }

                // 检测斜线（对角线方向）
                const diagonalLines = detectDiagonalLines(gray, width, height, threshold);

                // 如果检测到多条线或明显的斜线，认为被划掉
                return lineCount >= 2 || diagonalLines >= 1;
            } catch (e) {
                console.error('图像分析失败:', e);
                return false;
            }
        }

        // 检测对角线
        function detectDiagonalLines(gray, width, height, threshold) {
            let diagonalCount = 0;

            // 检测从左上到右下的对角线
            for (let start = 0; start < width + height - 1; start++) {
                let count = 0;
                for (let i = 0; i < height; i++) {
                    const j = start - i;
                    if (j >= 0 && j < width) {
                        const idx = i * width + j;
                        if (gray[idx] < threshold) count++;
                    }
                }
                if (count > Math.min(width, height) * 0.4) {
                    diagonalCount++;
                }
            }

            // 检测从右上到左下的对角线
            for (let start = -height; start < width; start++) {
                let count = 0;
                for (let i = 0; i < height; i++) {
                    const j = start + i;
                    if (j >= 0 && j < width) {
                        const idx = i * width + j;
                        if (gray[idx] < threshold) count++;
                    }
                }
                if (count > Math.min(width, height) * 0.4) {
                    diagonalCount++;
                }
            }

            return diagonalCount;
        }

        // 显示OCR识别结果（带划掉状态）
        function displayOCRResultsWithStatus(rooms) {
            const resultsContainer = document.getElementById('ocrResults');
            const statusEl = document.getElementById('ocrStatus');

            if (rooms.length === 0) {
                statusEl.className = 'ocr-status error';
                statusEl.textContent = '未识别到房号，请确保图片清晰并包含房号信息';
                document.getElementById('ocrActions').style.display = 'none';
                return;
            }

            const crossedOutCount = rooms.filter(r => r.isCrossedOut).length;
            const remainingCount = rooms.length - crossedOutCount;

            statusEl.className = 'ocr-status success';
            statusEl.innerHTML = `识别完成：${crossedOutCount}个已选（划掉），${remainingCount}个剩余`;

            let html = '';
            rooms.forEach(room => {
                // 在房源数据中查找匹配
                const matchedHouse = housesData.find(h =>
                    h.room_number.includes(room.roomNumber)
                );

                if (matchedHouse) {
                    const status = room.isCrossedOut ? '已选（划掉）' : '剩余房源';
                    const statusClass = room.isCrossedOut ? 'selected' : 'available';

                    html += `
                        <div class="ocr-result-item ${statusClass}">
                            <div class="ocr-result-info">
                                <span class="ocr-result-room">${matchedHouse.building} ${matchedHouse.room_number}</span>
                                <span class="ocr-result-status">${status}</span>
                            </div>
                            <input type="checkbox" class="ocr-result-checkbox" ${room.isCrossedOut ? 'checked' : ''}
                                   data-room="${matchedHouse.room_number}"
                                   data-crossed="${room.isCrossedOut}"
                                   id="ocr-check-${room.roomNumber}">
                        </div>
                    `;
                } else {
                    html += `
                        <div class="ocr-result-item not-found">
                            <div class="ocr-result-info">
                                <span class="ocr-result-room">房号 ${room.roomNumber}</span>
                                <span class="ocr-result-status">未找到对应房源</span>
                            </div>
                        </div>

                }
            });

            resultsContainer.innerHTML = html;
            document.getElementById('ocrActions').style.display = 'flex';
        }

        // 应用OCR识别结果
        async function applyOCRResults() {
            const checkboxes = document.querySelectorAll('.ocr-result-checkbox');
            let selectedCount = 0;
            let availableCount = 0;

            checkboxes.forEach(checkbox => {
                const roomNumber = checkbox.dataset.room;
                const house = housesData.find(h => h.room_number === roomNumber);

                if (house) {
                    if (checkbox.checked) {
                        // 勾选表示已选（划掉）
                        if (house.status !== 'selected') {
                            house.status = 'selected';
                            selectedCount++;
                        }
                    } else {
                        // 未勾选表示剩余
                        if (house.status === 'selected') {
                            house.status = 'available';
                            availableCount++;
                        }
                    }
                }
            });

            // 保存到Supabase
            await saveToCloud();

            // 更新显示
            updateStats();
            renderGridView();
            renderListView();

            // 关闭弹窗并显示成功提示
            closeOCRModal();

                let msg = '';
                if (selectedCount > 0) msg += `${selectedCount}个房源标记为已选`;
                if (availableCount > 0) {
                    if (msg) msg += '，';
                    msg += `${availableCount}个房源标记为剩余`;
                }
                if (!msg) msg = '没有房源状态需要更新';
                alert(`同步完成：${msg}！`);
            }, 300);

        // 获取筛选后的数据
        function getFilteredData() {
            // 获取筛选器值（如果元素存在）
            const buildingFilter = document.getElementById('buildingFilter');
            const floorFilter = document.getElementById('floorFilter');
            const roomTypeFilter = document.getElementById('roomTypeFilter');

            const building = buildingFilter ? buildingFilter.value : '';
            const floor = floorFilter ? floorFilter.value : '';
            const roomType = roomTypeFilter ? roomTypeFilter.value : '';

            return housesData.filter(h => {
                // 如果开启了房型筛选，只显示对应房型的剩余房源
                if (selectedRoomTypeFilter) {
                    // 必须是选中的房型
                    if (h.room_type !== selectedRoomTypeFilter) return false;
                    // 必须是剩余房源（available 或 reserved）
                    if (h.status === 'selected') return false;
                }

                // 如果开启剩余房源视图，只显示available和reserved
                if (showRemainingOnly && h.status === 'selected') {
                    return false;
                }

                // 根据统计卡片筛选
                if (currentStatFilter) {
                    if (currentStatFilter === 'all') return true; // 显示全部
                    if (currentStatFilter === 'selected' && h.status !== 'selected') return false;
                    if (currentStatFilter === 'remaining' && (h.status === 'selected')) return false;
                }

                // 根据楼栋切换器筛选
                if (h.building !== currentBuilding) return false;

                if (building && h.building !== building) return false;
                if (floor && h.floor !== parseInt(floor)) return false;
                if (roomType && h.room_type !== roomType) return false;
                return true;
            });
        }

                                            const preferredClass = isPreferred ? 'preferred' : '';
                                            return `
                                            <div class="house-card ${h.status} ${preferredClass}" data-house-id="${h.id}" onclick="toggleHouseSelection('${h.id}')">
                                                <div class="room-number">${h.room_number}</div>
                                                <div class="room-info">${h.room_type} · ${h.direction}</div>
                                                <div class="price">¥${h.price}</div>
                                            </div>
                                        `}).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 渲染列表视图
        function renderListView() {
            const data = getFilteredData();
            const container = document.getElementById('listView');

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <p>暂无符合条件的房源</p>
                    </div>
                `;
                return;
            }

            const statusText = {
                'available': '可选',
                'selected': '已选',
                'reserved': '已预订'
            };

            // 桌面端表格视图
            let html = `
                <table class="houses-table">
                    <thead>
                        <tr>
                            <th>楼栋</th>
                            <th>楼层</th>
                            <th>房号</th>
                            <th>房型</th>
                            <th>朝向</th>
                            <th>月租金</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(h => {
                            const isPreferred = preferredRoomTypes.includes(h.room_type);
                            const preferredBadge = isPreferred ? ' ⭐' : '';
                            return `
                            <tr class="${h.status}" data-house-id="${h.id}" onclick="toggleHouseSelection('${h.id}')" style="cursor: pointer;">
                                <td>${h.building}</td>
                                <td>${h.floor}层</td>
                                <td>${h.room_number}</td>
                                <td>${h.room_type}${preferredBadge}</td>
                                <td>${h.direction}</td>
                                <td>¥${h.price}</td>
                                <td><span class="status-badge ${h.status}">${statusText[h.status]}</span></td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
            `;

            // 移动端卡片视图
            html += `
                <div class="houses-list-mobile">
                    ${data.map(h => {
                        const isPreferred = preferredRoomTypes.includes(h.room_type);
                        const preferredBadge = isPreferred ? '⭐ ' : '';
                        return `
                        <div class="house-list-item ${h.status}" data-house-id="${h.id}" onclick="toggleHouseSelection('${h.id}')">
                            <div class="house-list-header">
                                <div class="house-list-title">${preferredBadge}${h.room_number}</div>
                                <div class="house-list-status ${h.status}">${statusText[h.status]}</div>
                            </div>
                            <div class="house-list-info">
                                <div class="house-list-info-item">
                                    <span class="house-list-info-label">楼栋</span>
                                    <span class="house-list-info-value">${h.building.replace('嘉禧苑', '')}</span>
                                </div>
                                <div class="house-list-info-item">
                                    <span class="house-list-info-label">楼层</span>
                                    <span class="house-list-info-value">${h.floor}层</span>
                                </div>
                                <div class="house-list-info-item">
                                    <span class="house-list-info-label">房型</span>
                                    <span class="house-list-info-value">${h.room_type}</span>
                                </div>
                                <div class="house-list-info-item">
                                    <span class="house-list-info-label">朝向</span>
                                    <span class="house-list-info-value">${h.direction}</span>
                                </div>
                                <div class="house-list-info-item">
                                    <span class="house-list-info-label">面积</span>
                                    <span class="house-list-info-value">${h.area || '-'}㎡</span>
                                </div>
                                <div class="house-list-info-item">
                                    <span class="house-list-info-label">户型</span>
                                    <span class="house-list-info-value">${h.layout || '-'}</span>
                                </div>
                            </div>
                            <div class="house-list-price">¥${h.price}/月</div>
                        </div>
                    `}).join('')}
                </div>
            `;

            container.innerHTML = html;
        }

        // 切换视图
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-toggle-inline button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (view === 'grid') {
                document.getElementById('gridView').classList.add('active');
                document.getElementById('listView').classList.remove('active');
            } else {
                document.getElementById('gridView').classList.remove('active');
                document.getElementById('listView').classList.add('active');
            }
        }

        // 切换楼栋
        function switchBuilding(building) {
            currentBuilding = building;

            // 更新标签样式
            document.querySelectorAll('.building-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.closest('.building-tab').classList.add('active');

            // 重新渲染视图
            renderGridView();
            renderListView();
        }

        // 应用筛选
        function applyFilters() {
            renderGridView();
            renderListView();
        }

        // 重置筛选
        function resetFilters() {
            // 重置筛选器值（如果元素存在）
            const buildingFilter = document.getElementById('buildingFilter');
            const floorFilter = document.getElementById('floorFilter');
            const roomTypeFilter = document.getElementById('roomTypeFilter');

            if (buildingFilter) buildingFilter.value = '';
            if (floorFilter) floorFilter.value = '';
            if (roomTypeFilter) roomTypeFilter.value = '';

            // 如果处于剩余房源视图，也重置
            if (showRemainingOnly) {
                toggleRemainingView();
            }

            // 如果处于统计卡片筛选状态，也重置
            if (currentStatFilter) {
                document.querySelectorAll('.stat-card').forEach(card => {
                    card.classList.remove('active');
                });
                currentStatFilter = null;
            }

            // 重置楼栋选择（默认选中A栋）
            currentBuilding = '嘉禧苑A栋';
            document.querySelectorAll('.building-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector('.building-tab[onclick="switchBuilding(\'嘉禧苑A栋\')"]').classList.add('active');

            // 重置意向房型
            preferredRoomTypes = [];
            document.querySelectorAll('.preferred-option').forEach(option => {
                option.classList.remove('selected');
            });

            renderGridView();
            renderListView();
        }

        // 初始化 - 检查登录状态
        checkLoginStatus();

        // 注册 Service Worker（PWA 支持）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW 注册成功:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW 注册失败:', error);
                    });
            });
        }

        // 检测是否以 PWA 模式运行
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            console.log('以 PWA 模式运行');
            document.body.classList.add('pwa-mode');
        }

        // 监听 PWA 安装提示
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('可以安装 PWA');
        });

        // 监听 PWA 安装完成
        window.addEventListener('appinstalled', () => {
            console.log('PWA 已安装');
            deferredPrompt = null;
        });

        // ==================== 图表功能 ====================
        let mainRoomTypeChart = null;

        // 初始化图表
        function initCharts() {
            // 主区域 - 户型分布柱状图
            const mainRoomTypeCtx = document.getElementById('mainRoomTypeChart');
            if (mainRoomTypeCtx) {
                mainRoomTypeChart = new Chart(mainRoomTypeCtx, {
                    type: 'bar',
                    data: {
                        labels: [],
                        datasets: [{
                            label: '已选',
                            data: [],
                            backgroundColor: '#ff6b6b',
                            borderRadius: 4
                        }, {
                            label: '未选',
                            data: [],
                            backgroundColor: '#4ecdc4',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    padding: 15,
                                    font: { size: 14 }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    font: { size: 12 }
                                }
                            },
                            x: {
                                ticks: {
                                    font: { size: 12 }
                                }
                            }
                        }
                    }
                });
            }
        }

        // 更新图表数据
        function updateCharts() {
            if (!housesData || housesData.length === 0) return;

            // 统计各户型的已选和未选数量
            const roomTypeStats = {};
            housesData.forEach(house => {
                const roomType = house.room_type || '未知';
                if (!roomTypeStats[roomType]) {
                    roomTypeStats[roomType] = { selected: 0, available: 0 };
                }
                if (house.status === 'selected') {
                    roomTypeStats[roomType].selected++;
                } else {
                    roomTypeStats[roomType].available++;
                }
            });

            const labels = Object.keys(roomTypeStats).sort();
            const selectedData = labels.map(type => roomTypeStats[type].selected);
            const availableData = labels.map(type => roomTypeStats[type].available);

            // 更新主区域 - 户型分布柱状图
            if (mainRoomTypeChart) {
                mainRoomTypeChart.data.labels = labels;
                mainRoomTypeChart.data.datasets[0].data = selectedData;
                mainRoomTypeChart.data.datasets[1].data = availableData;
                mainRoomTypeChart.update();
            }
        }

        // 在数据加载完成后初始化图表
        const originalLoadData = loadData;
        loadData = async function() {
            await originalLoadData();
            // 数据加载完成后初始化并更新图表
            setTimeout(() => {
                if (!mainRoomTypeChart) {
                    initCharts();
                }
                updateCharts();
            }, 500);
        };

        // 在房源状态改变时更新图表
        const originalToggleHouseSelection = toggleHouseSelection;
        toggleHouseSelection = async function(houseId) {
            await originalToggleHouseSelection(houseId);
            updateCharts();
        };

        // 页面加载完成后初始化图表
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!mainRoomTypeChart && housesData.length > 0) {
                    initCharts();
                    updateCharts();
                }
            }, 1000);
        });
    </script>
</body>
</html>
